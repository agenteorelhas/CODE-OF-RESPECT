<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code of Respect</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="particles-js"></div>

    <div class="chat-widget" onclick="toggleChat()" id="chatBtn">
        <i data-lucide="message-circle"></i>
    </div>

    <div class="chat-container" id="chatWindow">
        <div class="chat-header">
            <span>IA - ASSISTENTE ÉTICO</span>
            <span onclick="toggleChat()" style="cursor:pointer">X</span>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg bot-msg">Olá. Como posso ajudar hoje?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Digite aqui..." onkeypress="handleKeyPress(event)">
            <button onclick="enviarChat()">></button>
        </div>
    </div>

    <div class="main-content">
        <nav>
            <div class="logo-gold">⚖ CODE OF RESPECT</div>
            <div class="nav-links">
                <a href="#" onclick="showView('home')">Início</a>
                <a href="#" onclick="showView('denuncia')">Denunciar</a>
            </div>
        </nav>

        <div class="container">
            <main id="home" class="view active">
                <section class="hero">
                    <h1>Justiça, Ética e Respeito.</h1>
                </section>
                <div class="grid">
                    <div class="card">
                        <h3>Denúncia Segura</h3>
                        <p>Relate de forma sigilosa.</p>
                        <button class="btn btn-main" onclick="showView('denuncia')">Abrir Relato</button>
                    </div>
                </div>
            </main>
