<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code of Respect | Ética Corporativa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>

    <div class="chat-widget" onclick="toggleChat()">
        <i data-lucide="message-circle"></i>
    </div>

    <div class="chat-container" id="chatWindow">
        <div class="chat-header">
            <span>IA - ASSISTENTE ÉTICO</span>
            <i data-lucide="x" class="close-chat" onclick="toggleChat()" style="cursor:pointer;"></i>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg bot-msg">Olá. Sou o Assistente Ético do Code of Respect. Estou aqui para oferecer um espaço seguro e orientações precisas. Como posso ajudar?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Sua dúvida ou relato..." onkeypress="handleKeyPress(event)">
            <button class="btn-send" onclick="enviarChat()">
                <i data-lucide="send" style="width: 18px;"></i>
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="security-banner">
