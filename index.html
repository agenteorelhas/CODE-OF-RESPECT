<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code of Respect | Apoio e Denúncia</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="particles-js"></div>

    <nav>
        <img src="logo-code-of-respect.png" alt="Logo Monumental" class="logo-nav">
        <div class="nav-title">Denúncia Anônima</div>
    </nav>

    <div class="container">
        <section class="chat-container">
            <div id="chat-window">
                <div class="message ai-msg">Olá. Este é um ambiente seguro e anônimo. Como posso orientar você hoje?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="user-input" placeholder="Relate sua situação com segurança..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </section>

        <aside class="info-sidebar">
            <h3>Canais Oficiais</h3>
            <ul>
                <li>Disque 100</li>
                <li>Ministério Público</li>
                <li>Delegacia da Mulher</li>
            </ul>
            <button class="btn-panic" onclick="panicExit()">Sair Rapidamente (Esc)</button>
        </aside>
    </div>

    <footer>
        <img src="logo-seta-sozinho.png" alt="Seta" class="icon-footer">
        <p>© 2024 Code of Respect - Projeto Acadêmico</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
